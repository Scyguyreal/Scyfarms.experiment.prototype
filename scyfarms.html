<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weave</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://npmcdn.com/parse/dist/parse.min.js"></script>

<style>
  body {
    background-color: #f3f4f6;
    color: #111;
  }

  body.dark-mode {
    background-color: #181818;
    color: #e5e5e5;
  }

  body.dark-mode nav {
    background-color: #202020;
  }

  body.dark-mode .card {
    background-color: #242424;
  }

  body.dark-mode input,
  body.dark-mode textarea {
    background-color: #2a2a2a;
    color: #e5e5e5;
    border-color: #444;
  }

  body.dark-mode ::placeholder {
    color: #aaa;
  }
</style>
</head>

<body class="font-sans">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <nav class="w-64 p-6 flex flex-col space-y-4 shadow card">
    <h1 class="text-2xl font-bold">Weave</h1>

    <button onclick="showFeed()" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700">Home</button>
    <button onclick="openNotifications()" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700">Notifications</button>
    <button onclick="showProfile()" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700">Profile</button>
    <button onclick="openSettings()" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700">Settings</button>
    <button onclick="logout()" class="p-2 rounded text-red-500">Logout</button>
  </nav>

  <!-- Main -->
  <main class="flex-1 p-6">

    <!-- Feed -->
    <div id="feedPage">
      <div class="card rounded-xl p-4 mb-4 shadow">
        <textarea id="newPost" class="w-full p-2 border rounded mb-2" placeholder="What’s happening?"></textarea>
        <button onclick="createPost()" class="bg-blue-500 text-white px-4 py-2 rounded">Post</button>
      </div>
      <div id="feed" class="space-y-4"></div>
    </div>

    <!-- Profile -->
    <div id="profilePage" class="hidden">
      <h2 class="text-2xl font-bold mb-2">Profile</h2>
      <p>@<span id="profileUsername"></span></p>
      <img id="profilePic" class="w-24 h-24 rounded-full mt-2">
    </div>

  </main>
</div>

<!-- Notifications Modal -->
<div id="notificationsModal" class="fixed inset-0 hidden bg-black bg-opacity-50 flex items-center justify-center">
  <div class="card p-6 rounded-xl w-96 relative">
    <h2 class="text-xl font-bold mb-2">Notifications</h2>
    <div id="notificationsList">Nothing yet 👀</div>
    <button onclick="closeNotifications()" class="absolute top-2 right-2">✖</button>
  </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="fixed inset-0 hidden bg-black bg-opacity-50 flex items-center justify-center">
  <div class="card p-6 rounded-xl w-96 relative">
    <h2 class="text-xl font-bold mb-4">Settings</h2>

    <label class="flex items-center gap-2">
      <input type="checkbox" id="darkToggle" onchange="toggleDarkMode()">
      Dark Mode
    </label>

    <button onclick="closeSettings()" class="absolute top-2 right-2">✖</button>
  </div>
</div>

<!-- Auth -->
<div id="authModal" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center">
  <div class="card p-6 rounded-xl w-96">
    <h2 class="text-xl font-bold mb-4">Login</h2>
    <input id="username" class="w-full p-2 border rounded mb-2" placeholder="Username">
    <input id="password" type="password" class="w-full p-2 border rounded mb-2" placeholder="Password">
    <button onclick="login()" class="w-full bg-blue-500 text-white p-2 rounded">Login</button>
  </div>
</div>

<script>
Parse.initialize("lwPJm4UFv3m4pZypU2ms9BVQvgFZ35lVOheiW9vx","MHinq9g59aQSit8lalBEYaC1MjLo8rZkhFzdqxMP");
Parse.serverURL = "https://parseapi.back4app.com/";

function showFeed(){
  feedPage.classList.remove("hidden");
  profilePage.classList.add("hidden");
}

function showProfile(){
  feedPage.classList.add("hidden");
  profilePage.classList.remove("hidden");
}

function openNotifications(){
  notificationsModal.classList.remove("hidden");
}

function closeNotifications(){
  notificationsModal.classList.add("hidden");
}

function openSettings(){
  settingsModal.classList.remove("hidden");
}

function closeSettings(){
  settingsModal.classList.add("hidden");
}

async function toggleDarkMode(){
  document.body.classList.toggle("dark-mode");
  const user = Parse.User.current();
  user.set("darkMode", document.body.classList.contains("dark-mode"));
  await user.save();
}

async function login(){
  await Parse.User.logIn(username.value, password.value);
  authModal.classList.add("hidden");
  loadUser();
}

function logout(){
  Parse.User.logOut();
  location.reload();
}

async function loadUser(){
  const user = Parse.User.current();
  if(!user) return;
  profileUsername.textContent = user.get("username");
  if(user.get("darkMode")) {
    document.body.classList.add("dark-mode");
    darkToggle.checked = true;
  }
  loadPosts();
}

async function createPost(){
  const Post = Parse.Object.extend("Posts");
  const post = new Post();
  post.set("username", Parse.User.current().get("username"));
  post.set("content", newPost.value);
  await post.save();
  newPost.value = "";
  loadPosts();
}

async function loadPosts(){
  feed.innerHTML = "";
  const Post = Parse.Object.extend("Posts");
  const posts = await new Parse.Query(Post).descending("createdAt").find();
  const currentUser = Parse.User.current();

  for(const post of posts){
    const div = document.createElement("div");
    div.className = "card p-4 rounded-xl shadow";

    const username = post.get("username");
    const isSelf = username === currentUser.get("username");
    const following = await isFollowing(username);

    div.innerHTML = `
      <div class="flex justify-between items-center">
        <strong>@${username}</strong>
        ${!isSelf ? `<button class="text-blue-500" onclick="toggleFollow('${username}', this)">
          ${following ? "Following" : "Follow"}
        </button>` : ""}
      </div>
      <p class="mt-2">${post.get("content")}</p>
    `;
    feed.appendChild(div);
  }
}

async function toggleFollow(username, btn){
  const currentUser = Parse.User.current();
  const user = await new Parse.Query(Parse.User).equalTo("username", username).first();
  const rel = currentUser.relation("following");

  if(await isFollowing(username)){
    rel.remove(user);
    btn.textContent = "Follow";
  } else {
    rel.add(user);
    btn.textContent = "Following";
  }
  await currentUser.save();
}

async function isFollowing(username){
  const currentUser = Parse.User.current();
  const user = await new Parse.Query(Parse.User).equalTo("username", username).first();
  const rel = currentUser.relation("following");
  const found = await rel.query().equalTo("objectId", user.id).find();
  return found.length > 0;
}

if(Parse.User.current()){
  authModal.classList.add("hidden");
  loadUser();
}
</script>

</body>
</html>
